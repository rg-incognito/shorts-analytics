name: Fix Action Item

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel: friends or himym'
        required: true
      action_item:
        description: 'Action item to implement'
        required: true
      why:
        description: 'Why this matters'
        required: false
        default: ''

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve target repo
        id: target
        run: |
          if [ "${{ github.event.inputs.channel }}" = "friends" ]; then
            echo "repo=rg-incognito/shortgen" >> $GITHUB_OUTPUT
            echo "series=Friends" >> $GITHUB_OUTPUT
          else
            echo "repo=rg-incognito/shortgen-himym" >> $GITHUB_OUTPUT
            echo "series=How I Met Your Mother" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.target.outputs.repo }}
          token: ${{ secrets.FIX_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
        run: |
          mkdir -p ~/.claude
          printf '%s' "$CLAUDE_CREDENTIALS" > ~/.claude/.credentials.json

      - name: Create fix branch
        id: branch
        env:
          ACTION: ${{ github.event.inputs.action_item }}
        run: |
          SLUG=$(echo "$ACTION" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/-\+/-/g' | cut -c1-45 | sed 's/-$//')
          git checkout -b "fix/${SLUG}"
          echo "name=fix/${SLUG}" >> $GITHUB_OUTPUT

      - name: Run Claude Code fix
        env:
          SERIES: ${{ steps.target.outputs.series }}
          ACTION: ${{ github.event.inputs.action_item }}
          WHY: ${{ github.event.inputs.why }}
        run: |
          claude --dangerously-skip-permissions -p "You are fixing a YouTube Shorts automation pipeline for the ${SERIES} channel.

          ACTION ITEM: ${ACTION}

          WHY IT MATTERS: ${WHY}

          Source files are in src/:
          - analyzer.py  — Gemini prompts for clip selection and YouTube metadata
          - main.py      — orchestrator (MAX_RUNS, upload logic)
          - captioner.py — ASS subtitle generation, font, caption style
          - clipper.py   — ffmpeg clip cutting and merging
          - reframer.py  — face tracking, 9:16 reframe

          Steps:
          1. Read the relevant src/ files
          2. Make ONLY the minimal surgical change to implement the action item
          3. Do not touch unrelated code
          4. Read the changed file back to verify valid Python syntax"

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.FIX_PAT }}
          ACTION: ${{ github.event.inputs.action_item }}
          WHY: ${{ github.event.inputs.why }}
          REPO: ${{ steps.target.outputs.repo }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No file changes — nothing to commit"
            exit 1
          fi
          git commit -m "fix: ${ACTION:0:72}"
          git push origin "$BRANCH"
          gh pr create \
            --repo "$REPO" \
            --title "fix: ${ACTION:0:72}" \
            --body "$(printf '## What changed\n\nImplemented by Claude Code.\n\n## Why\n%s' "$WHY")" \
            --head "$BRANCH"
