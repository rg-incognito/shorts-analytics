name: Refresh Analytics Report

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build report
        env:
          FRIENDS_YT_TOKEN_JSON: ${{ secrets.FRIENDS_YT_TOKEN_JSON }}
          HIMYM_YT_TOKEN_JSON:   ${{ secrets.HIMYM_YT_TOKEN_JSON }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
        run: python src/build_report.py

      - name: Commit updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: refresh analytics report [skip ci]"
          git push
